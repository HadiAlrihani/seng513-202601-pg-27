services:
  client:
    build: ./client
    container_name: react_client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    stdin_open: true
    tty: true

  server:
    build: ./server
    container_name: express_server
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${db_username}
      - DB_PASSWORD=${db_password}
      - DB_NAME=${db_name}
    depends_on:
      - db

  db:
    build: ./db
    container_name: postgresdb
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${db_username}
      - POSTGRES_PASSWORD=${db_password}
      - POSTGRES_DB=${db_name}
